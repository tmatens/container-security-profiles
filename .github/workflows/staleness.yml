name: staleness
# Re-derive-on-digest-bump trigger (compose-lint#360 step 4, part 1): weekly,
# check whether any cataloged profile's pinned digest still matches the tag's
# current published digest. On drift, open/update a tracking issue — the signal
# to re-derive that image on the self-hosted BPF runner. Registry-only (no docker,
# no BPF, no secret), so it runs on a hosted runner.
on:
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'
      - run: pip install -r requirements.txt
      - id: check
        run: |
          python scripts/check_staleness.py --catalog-dir catalog > staleness.log 2>&1 && rc=0 || rc=$?
          cat staleness.log
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
      - name: open or update tracking issue on drift
        if: steps.check.outputs.rc != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Stale catalog profiles — re-derive needed"
          body="$(cat staleness.log)

          Re-derive the flagged image(s) on the self-hosted BPF runner and update
          the profile's pinned digest + validated_date. See docs / compose-lint#360."
          num=$(gh issue list --state open --json number,title \
            --jq '.[] | select(.title=="'"$title"'") | .number' | head -1)
          if [ -n "$num" ]; then
            gh issue comment "$num" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi
