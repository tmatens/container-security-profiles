name: validate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.14'
      - run: pip install -r requirements.txt
      - name: fetch pinned contract (schema + validator) from compose-lint
        run: bash scripts/fetch-contract.sh
      - name: validate profiles
        run: |
          python .contract/validate_profiles.py --catalog-dir catalog \
            --schema .contract/profile.schema.json --repo-root . > out.log 2>&1 && rc=0 || rc=$?
          cat out.log; exit $rc
      - name: site generator builds (smoke — publishing is gated, see pages.yml)
        run: |
          pip install -r requirements-site.txt
          python scripts/build_site.py --out /tmp/_site > site.log 2>&1 && rc=0 || rc=$?
          cat site.log; exit $rc
