name: validate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: fetch pinned contract (schema + validator) from compose-lint
        run: bash scripts/fetch-contract.sh
      - name: validate profiles
        run: |
          python .contract/validate_profiles.py --catalog-dir catalog \
            --schema .contract/profile.schema.json --repo-root . > out.log 2>&1 && rc=0 || rc=$?
          cat out.log; exit $rc
