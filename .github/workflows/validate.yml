name: validate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: validate profiles
        run: |
          python scripts/validate_profiles.py --catalog-dir catalog \
            --schema schema/profile.schema.json --repo-root . > out.log 2>&1 && rc=0 || rc=$?
          cat out.log; exit $rc
