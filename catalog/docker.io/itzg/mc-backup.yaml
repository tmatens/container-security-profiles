# itzg/mc-backup — minimum Linux capabilities, derived by an IN-STACK drop-test
# (the first dependent-tier profile). mc-backup cannot be exercised alone: it
# RCON-flushes a running minecraft server and tars minecraft's SHARED /data into
# /backups. So it was derived with minecraft brought up as a dependency and its
# /data shared into mc-backup, verifying that a REAL backup (containing the world)
# is produced. See criteria/docker.io/itzg/mc-backup.md.
#
# capabilities: cap_drop:[ALL] + cap_add:[DAC_OVERRIDE]. mc-backup runs as ROOT and
# does not drop privileges; DAC_OVERRIDE lets root read minecraft's uid-1000,
# mode-0750 /data. Without it mc-backup still writes an archive FILE but archives
# NOTHING (a 0-entry empty tar) — so DAC_OVERRIDE is the one required cap; all other
# Docker defaults (including SETUID/SETGID) are removable.
#
# NOTE: the commonly-seen cap_add:[SETUID, SETGID] for this sidecar is WRONG — it
# causes no privilege drop and, without DAC_OVERRIDE, yields silently EMPTY backups.
schema_version: "1.3"
image: docker.io/itzg/mc-backup
applies_to:
  tags: ["latest"]
status: validated
dimensions:
  capabilities:
    cap_drop: [ALL]
    cap_add: [DAC_OVERRIDE]
    derivation:
      tool: container-sec-derive
      tool_version: "0.7.0"
      sidecar_schema_version: "1.5"
      observer: drop-test
      validated_image: docker.io/itzg/mc-backup@sha256:085e2da59e4906782a9e5a27afe9c1b7d9e9655c9fbf34350d6e91a9895d6814
      validated_date: "2026-07-04"
      duration_seconds: 144
      confidence: high
      workload: profiles/workloads/mc-backup.sh
      workload_sha256: "aaa52e3a587d3ed0bfd44d69d546cd761dad8cc43259b25aa2ee3288271ae717"
      validated_via: [drop-test, ci-smoke]
      observation_backend:
        ig_version: v0.51.0
        gadgets: []
      run_config:
        user: ""
        command: []
        entrypoint: ""
        network: ""
        pid: ""
        devices: []
        security_opt: ["no-new-privileges:true"]
        mounts: ["minecraft-data:/data", "/mnt/minecraft/backups:/backups"]
        env: [RCON_HOST, RCON_PORT, RCON_PASSWORD, BACKUP_INTERVAL, INITIAL_DELAY, BACKUP_METHOD, TAR_COMPRESS_METHOD]
      drop_test:
        checks:
          - {removed: CHOWN, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: DAC_OVERRIDE, required: true, observed: "no real backup: newest archive has 0 entries (empty tar -> could not read the shared /data)"}
          - {removed: FSETID, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: FOWNER, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: MKNOD, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: NET_RAW, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: SETGID, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: SETUID, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: SETFCAP, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: SETPCAP, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: NET_BIND_SERVICE, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: SYS_CHROOT, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: KILL, required: false, observed: "correct: backup archive contains the world (175 entries)"}
          - {removed: AUDIT_WRITE, required: false, observed: "correct: backup archive contains the world (175 entries)"}
