# minecraft (itzg/minecraft-server) — minimum Linux capabilities, derived by
# drop-test. This profile trims the full Docker default cap set 14 -> 2.
#
# capabilities: cap_drop:[ALL] + cap_add:[SETGID, SETUID]. The entrypoint starts as
# root and gosu-drops to the minecraft user (uid 1000) to run the server; dropping
# either fails with `error: failed switching to 'minecraft:minecraft'`. Both are
# STARTUP caps, invisible to runtime observation. CHOWN/DAC_OVERRIDE are NOT needed:
# the image ships /data owned by the minecraft user (1000), so a docker-managed
# volume inherits that ownership and no datadir chown happens (the same shape as
# mariadb). This validates the commonly-declared cap_add:[SETUID, SETGID].
#
# The minimum is set by the entrypoint's init + privilege drop, independent of the
# server flavour, so it was derived with a fast VANILLA/FLAT config and applies
# equally to a PURPUR/PAPER/FABRIC deployment (that only changes the server jar).
schema_version: "1.3"
image: docker.io/itzg/minecraft-server
applies_to:
  tags: ["latest"]
status: validated
dimensions:
  capabilities:
    cap_drop: [ALL]
    cap_add: [SETGID, SETUID]
    derivation:
      tool: container-sec-derive
      tool_version: "0.7.0"
      sidecar_schema_version: "1.5"
      observer: drop-test
      validated_image: docker.io/itzg/minecraft-server@sha256:2e7c7b7641a8f30e70fa8d357bc2ad1c029cb56c93ca7f39af08713166c755ca
      validated_date: "2026-07-04"
      duration_seconds: 181
      confidence: high
      workload: profiles/workloads/minecraft.sh
      workload_sha256: "87fe92c25b5f7affdd174e6fa7af40ecb12fcccc69b69b86c32d23b6dcb6232b"
      validated_via: [drop-test, ci-smoke]
      observation_backend:
        ig_version: v0.51.0
        gadgets: []
      run_config:
        user: ""
        command: []
        entrypoint: ""
        network: ""
        pid: ""
        devices: []
        security_opt: ["no-new-privileges:true"]
        mounts: ["minecraft-data:/data"]
        env: [EULA, TYPE, VERSION, LEVEL_TYPE, GENERATE_STRUCTURES, MEMORY, ONLINE_MODE]
      drop_test:
        checks:
          - {removed: CHOWN, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: DAC_OVERRIDE, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: FSETID, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: FOWNER, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: MKNOD, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: NET_RAW, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: SETGID, required: true, observed: "container exited: error: failed switching to 'minecraft:minecraft': operation not permitted"}
          - {removed: SETUID, required: true, observed: "container exited: error: failed switching to 'minecraft:minecraft': operation not permitted"}
          - {removed: SETFCAP, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: SETPCAP, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: NET_BIND_SERVICE, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: SYS_CHROOT, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: KILL, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
          - {removed: AUDIT_WRITE, required: false, observed: "correct: server responds to status ping, java uid=1000 (non-root)"}
