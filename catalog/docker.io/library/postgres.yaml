# postgres read-only-filesystem minimum. `read_only: true` is informed by fs
# observation (all runtime writes land on the data VOLUME), but the tmpfs set was
# established by drop-test (verification): postgres runs correctly under
# read_only:true + tmpfs:[/run/postgresql], and FAILS under read_only:true with no
# tmpfs — "could not create lock file /var/run/postgresql/.s.PGSQL.5432.lock:
# Read-only file system". That socket-dir write happens once at startup, which
# runtime observation cannot reliably capture (attach-window), so drop-test is the
# authoritative source here.
schema_version: "1.1"
image: docker.io/library/postgres
applies_to:
  tags: ["16"]
status: validated
dimensions:
  filesystem:
    read_only: true
    tmpfs: [/run/postgresql]
    derivation:
      tool: container-sec-derive
      tool_version: "0.6.0"
      sidecar_schema_version: "1.5"
      observer: drop-test
      validated_image: docker.io/library/postgres@sha256:fe03a7605299a34ddf5e4f285dff78c3d7190a576b3c6b46f2fcff69f4bffd54
      validated_date: "2026-07-03"
      duration_seconds: 60
      confidence: high
      workload: profiles/workloads/postgres.sh
      workload_sha256: "0e9927503276921e3a549fe815e0cd6296684a0b2f6af301df0bff7028c9bc43"
      validated_via: [drop-test, ci-smoke]
      observation_backend:
        ig_version: v0.51.0
        gadgets: []
      drop_test:
        checks:
          - removed: /run/postgresql
            required: true
            observed: "postgres did not become ready in 60s"
