# Re-derivation spec (compose-lint#360 step 4). How to re-derive each catalog
# profile representatively. Consumed by container-sec-derive's derive-profiles
# loop on the self-hosted BPF runner: on a digest bump it re-derives against the
# new digest and, if the recommendation is unchanged, bumps validated_image +
# validated_date; if it changed, opens a human-review PR.
#
# The loop dispatches per `method`:
#   drop-test       — csd's scripts/drop_test.sh: drop-a-candidate / restart /
#                     correctness check. Covers the full container lifetime,
#                     so it derives the startup-only minimums runtime observation
#                     is blind to (a socket dir's tmpfs, a root->user privilege
#                     drop's SETUID/SETGID). Both current entries use it.
#   bpf-observation — csd --observe: the ig gadgets, for dimensions whose
#                     requirements are purely runtime.
# Both methods are automated; the loop matches a drop-test entry to its csd spec
# (testdata/drop-test/*.yaml) by image + dimension.
images:
  - profile: catalog/docker.io/library/postgres.yaml
    image: docker.io/library/postgres
    tag: "16"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/postgres.sh
    note: >-
      read_only:true + tmpfs:[/run/postgresql]. The tmpfs is not purely
      observable — postgres creates its socket dir at startup, which is
      attach-window-blind. Re-derive by verification: run under read_only +
      candidate tmpfs and confirm the workload passes (it fails with no tmpfs:
      "could not create lock file /var/run/postgresql/...: Read-only file system").

  - profile: catalog/docker.io/library/postgres.yaml
    image: docker.io/library/postgres
    tag: "16"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/postgres.sh
    note: >-
      cap_add:[CHOWN, DAC_OVERRIDE, SETGID, SETUID] — all startup caps (gosu
      root->postgres drop + initdb). Derived under the filesystem dimension's
      read_only+tmpfs recommendation (the profile is applied as a unit): the
      root-owned tmpfs socket dir must be chowned → CHOWN, invisible when caps are
      derived on a writable rootfs. Correctness check asserts the server (PID 1) is
      non-root. The combined profile is workload-verified.

  - profile: catalog/docker.io/netdata/netdata.yaml
    image: docker.io/netdata/netdata
    tag: v2.10.3
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/netdata.sh
    note: >-
      cap_add minimum via drop-and-restart drop-test with the netdata.sh
      correctness check (asserts the daemon still drops to a non-root uid).
      Startup caps (SETUID/SETGID) are invisible to runtime observation.
      Representative run: pid:host, host /proc,/sys,docker.sock ro-mounts, host
      network, the granted cap set present.

  - profile: catalog/docker.io/library/caddy.yaml
    image: docker.io/library/caddy
    tag: "2"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/caddy.sh
    note: >-
      cap_add minimum via drop-test: baseline cap_drop:ALL + the Docker default
      cap set, drop each and re-verify the file server serves on :80. Only
      NET_BIND_SERVICE (bind the privileged :80) survives.

  - profile: catalog/docker.io/library/caddy.yaml
    image: docker.io/library/caddy
    tag: "2"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/caddy.sh
    note: >-
      read_only:true, tmpfs:[] — caddy serves under --read-only; /data (certs)
      and /config (autosave) drop-test as not-required-as-tmpfs and belong on
      persistent volumes.

  - profile: catalog/ghcr.io/gethomepage/homepage.yaml
    image: ghcr.io/gethomepage/homepage
    tag: v1.13.2
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/homepage.sh
    note: >-
      read_only:true, tmpfs:[/app/.next/cache] — Next.js image optimization
      mkdir's the cache on the first /_next/image request and errors when it
      isn't writable (a bare dashboard GET serves without it, so the correctness check
      must exercise image optimization). /app/config is a persistent volume, not
      tmpfs; /tmp is not required.

  - profile: catalog/codeberg.org/forgejo/forgejo.yaml
    image: codeberg.org/forgejo/forgejo
    tag: "15"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/forgejo.sh
    note: >-
      cap_add:[CHOWN, DAC_OVERRIDE, SETGID, SETUID, SYS_CHROOT] via drop-test:
      baseline cap_drop:ALL + the Docker default cap set on a fresh /data volume,
      drop each and re-verify. The container runs two root daemons under s6, so the
      minimum is the union: gitea web needs CHOWN/DAC_OVERRIDE (chown+setup the
      fresh /data) + SETUID/SETGID (su-exec root->git drop); sshd needs SYS_CHROOT
      (per-connection privsep chroot). SYS_CHROOT is the coverage sharp edge — a
      web-only check reports 200 while git-over-SSH is dead, so the workload
      exercises SSH. All five are startup caps, invisible to runtime observation.

  - profile: catalog/ghcr.io/home-assistant/home-assistant.yaml
    image: ghcr.io/home-assistant/home-assistant
    tag: "2026.7.1"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/home-assistant.sh
    note: >-
      cap_add:[DAC_OVERRIDE] via drop-test: baseline cap_drop:ALL + the Docker
      default cap set, drop each and re-verify HA reaches onboarding + creates the
      owner user. HA runs python3 -m homeassistant under s6 AS ROOT (no privilege
      drop, no chown), so the only cap it needs is DAC_OVERRIDE — root writing its
      DB/.storage/logs into a NON-root-owned /config bind. Derived under a fresh,
      non-root-owned /config (faithful to the ./config bind); a root-owned config
      needs no caps. HA *core* only — integration-specific caps (NET_RAW ping,
      device access, NET_ADMIN) are not exercised by a base instance (see criteria).

  - profile: catalog/docker.io/library/mariadb.yaml
    image: docker.io/library/mariadb
    tag: "11.4"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/mariadb.sh
    note: >-
      cap_add:[SETGID, SETUID] via drop-test: baseline cap_drop:ALL + the Docker
      default cap set on a fresh datadir, drop each and re-verify a query round-trip
      + a non-root (uid 999) mariadbd. The entrypoint re-execs as the mysql user via
      gosu (SETUID/SETGID) — the only always-required step. CHOWN/DAC_OVERRIDE are
      NOT needed by default: the image ships /var/lib/mysql owned by mysql, so a
      docker-managed volume inherits it and the find-chown is a no-op. A foreign-owned
      bind mount adds CHOWN (only); running as the mysql uid on a pre-owned datadir
      shrinks it to []. Startup caps, invisible to runtime observation.

  - profile: catalog/docker.io/grafana/grafana.yaml
    image: docker.io/grafana/grafana
    tag: "13.0.2"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/grafana.sh
    note: >-
      read_only:true, tmpfs:[] — grafana runs under --read-only with only its
      /var/lib/grafana data volume (persistent: sqlite DB + plugins, NOT tmpfs)
      writable. Baseline read_only + candidate /tmp; drop /tmp and re-verify health
      db ok + a dashboard write/read-back + a backend datasource (Loki) plugin
      running. /tmp is NOT required for core + prometheus/Loki datasource querying;
      it is used only by runtime plugin installation, the elasticsearch plugin, and
      rendering/export (add tmpfs:[/tmp] for those). Confidence moderate — grafana's
      feature surface exceeds this workload's coverage (see criteria).

  - profile: catalog/docker.io/grafana/loki.yaml
    image: docker.io/grafana/loki
    tag: "3.7.2"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/loki.sh
    note: >-
      read_only:true, tmpfs:[] — loki runs under --read-only with only its /loki
      data dir (persistent: chunks/WAL/index/rules, NOT tmpfs) writable. Baseline
      read_only + candidate /tmp; drop /tmp and re-verify loki reaches /ready + a
      log push (204) + a query round-trip returns the line. /tmp NOT required (zero
      read-only-fs errors). loki is DISTROLESS, so the correctness check probes it
      from a sidecar sharing its netns, not docker exec. /loki stand-in is
      mode=1777 (loki runs as non-root uid 10001).

  - profile: catalog/docker.io/grafana/alloy.yaml
    image: docker.io/grafana/alloy
    tag: v1.16.2
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/alloy.sh
    note: >-
      read_only:true, tmpfs:[] — alloy runs under --read-only with only its
      storage.path location writable (default --storage.path=/var/lib/alloy/data;
      the persistent WAL/state dir, NOT tmpfs). Baseline read_only + candidate /tmp;
      drop /tmp and re-verify /-/ready + live alloy_ pipeline metrics. /tmp NOT
      required under the default storage.path (a --storage.path=/tmp/alloy override
      would need tmpfs:[/tmp]). alloy is DISTROLESS, so the check probes it from a
      sidecar sharing its netns (the same helper loki uses), not docker exec. The
      writable stand-in is mounted at the PARENT /var/lib/alloy (alloy creates the
      data subdir itself) with mode=1777 (alloy runs as non-root uid 473).

  - profile: catalog/docker.io/library/redis.yaml
    image: docker.io/library/redis
    tag: "8.2.7"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/redis.sh
    note: >-
      cap_add:[SETGID, SETUID] — startup caps (root->redis re-exec). SHARP EDGE:
      with either dropped, redis keeps serving correctly AS ROOT — only the
      correctness check's non-root uid assertion catches it, so any re-derivation
      MUST keep the uid assert (a workload-only check falsely derives both as
      removable). Default invocation: no user:, no binds (image anonymous /data,
      pre-owned, so no CHOWN); a foreign-owned data bind re-introduces CHOWN.

  - profile: catalog/docker.io/valkey/valkey.yaml
    image: docker.io/valkey/valkey
    tag: "9"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/valkey.sh
    note: >-
      cap_add:[SETGID, SETUID] — startup caps (root->valkey setpriv drop; either
      dropped = container exits at start). Same sharp edge as redis: the
      correctness check MUST assert a non-root server uid. Profile scope is the
      no-data-volume invocation (image's pre-owned /data, so no CHOWN — a
      documented over-grant note in the profile); immich's tmpfs invocation
      (CHOWN needed) is deploy-check's scope (csd deploy-check/manifest.yaml),
      never this entry's. Spec: csd testdata/drop-test/valkey-caps.yaml.

  - profile: catalog/docker.io/library/mysql.yaml
    image: docker.io/library/mysql
    tag: "8.4"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/mysql.sh
    note: >-
      cap_add:[DAC_OVERRIDE, SETGID, SETUID] — all startup caps. SETGID/SETUID =
      the gosu root->mysql re-exec (mariadb shape). DAC_OVERRIDE is the mysql
      divergence: the ROOT-phase entrypoint `find` must traverse
      /var/lib/mysql-files (mysql-owned 750) and root without DAC_OVERRIDE fails
      normal DAC checks there. No CHOWN on docker-managed volumes (datadir ships
      mysql-owned 1777); a foreign-owned bind re-introduces it. Correctness MUST
      keep the non-root uid assert (redis/mariadb sharp edge). Spec: csd
      testdata/drop-test/mysql-caps.yaml.

  - profile: catalog/docker.io/library/mongo.yaml
    image: docker.io/library/mongo
    tag: "8.0"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/mongo.sh
    note: >-
      cap_add:[SETGID, SETUID] — the gosu root->mongodb re-exec; either dropped
      = container never starts. No CHOWN (data dirs ship mongodb-owned; foreign
      bind re-introduces it); no SYS_NICE (official test grants it for NUMA,
      but it is outside the default set and mongod warns instead of failing).
      Correctness MUST keep the non-root uid assert. Spec: csd
      testdata/drop-test/mongo-caps.yaml.

  - profile: catalog/docker.io/library/rabbitmq.yaml
    image: docker.io/library/rabbitmq
    tag: "4.3"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/rabbitmq.sh
    note: >-
      cap_add:[SETGID, SETUID] — the gosu root->rabbitmq re-exec; either
      dropped = container never starts. No CHOWN (data volume ships
      rabbitmq-owned). TWO HARNESS SHARP EDGES (reproduced on 4.3): never exec
      a rabbitmq CLI during boot (root Erlang client races .erlang.cookie ->
      broker crash; gate on "Server startup complete" log line), and exec CLIs
      as --user rabbitmq never root (root probe needs DAC_OVERRIDE/FOWNER ->
      pollutes the minimum). Declares must be durable on 4.x. Spec: csd
      testdata/drop-test/rabbitmq-caps.yaml.

  - profile: catalog/docker.io/prom/prometheus.yaml
    image: docker.io/prom/prometheus
    tag: "v3.13.1"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/prometheus.sh
    note: >-
      ZERO-CAP: cap_drop:[ALL], no cap_add — image runs as USER nobody from the
      first instruction, no root phase at all. Workload must assert the TSDB
      write path (self-scrape up==1 + samples appended, both polled — first
      scrape ~15s, appended counter reads 0 on its first report). Probes exec
      as nobody by construction. Spec: csd testdata/drop-test/prometheus-caps.yaml.

  - profile: catalog/docker.io/prom/prometheus.yaml
    image: docker.io/prom/prometheus
    tag: "v3.13.1"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/prometheus.sh
    note: >-
      read_only:true, tmpfs:[] — all writes go to the /prometheus VOLUME
      (persistent in real deployments, never tmpfs; docker mounts it writable
      under read_only). /tmp derived not required. Spec: csd
      testdata/drop-test/prometheus-fs.yaml.

  - profile: catalog/docker.io/library/traefik.yaml
    image: docker.io/library/traefik
    tag: "v3.7"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/traefik.sh
    note: >-
      cap_add:[NET_BIND_SERVICE] for the :80 entrypoint bind — ONLY under the
      pinned sysctl net.ipv4.ip_unprivileged_port_start=1024 (docker defaults 0
      = falsely-removable; the spec pins the hardened posture, csd#340 item 5).
      File-provider invocation with an in-stack caddy dep; docker-socket
      variant deliberately out of scope (the socket is the risk, csd#110).
      Dynamic config docker-cp'd into /tmp + directory watch. Spec: csd
      testdata/drop-test/traefik-caps.yaml.

  - profile: catalog/docker.io/library/httpd.yaml
    image: docker.io/library/httpd
    tag: "2.4"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/httpd.sh
    note: >-
      cap_add:[NET_BIND_SERVICE, SETGID, SETUID] — master/worker shape: root
      master, www-data workers. SHARP EDGE PROVEN: SETGID dropped -> httpd
      KEEPS SERVING with ROOT workers; only the worker uid assert catches it
      (content-only check false-passes). NET_BIND_SERVICE scoped to the pinned
      ip_unprivileged_port_start=1024 posture. Spec: csd
      testdata/drop-test/httpd-caps.yaml.

  - profile: catalog/docker.io/library/memcached.yaml
    image: docker.io/library/memcached
    tag: "1.6"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/memcached.sh
    note: >-
      ZERO-CAP: USER memcache (11211) from the first instruction, unprivileged
      port, no persistence. Round-trip over in-image bash /dev/tcp (no client
      tool ships); exec inherits USER memcache so no probe pollution. Spec:
      csd testdata/drop-test/memcached-caps.yaml.

  - profile: catalog/docker.io/library/eclipse-mosquitto.yaml
    image: docker.io/library/eclipse-mosquitto
    tag: "2.0"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/mosquitto.sh
    note: >-
      cap_add:[SETGID, SETUID] — the broker's own IN-PROCESS drop (third
      shape: not gosu, not master/worker); refuses to start with either
      dropped. Unprivileged :1883 = no NET_BIND_SERVICE. Probe hygiene: exec
      as --user mosquitto AND write nothing in-container (a /tmp capture
      would false-require the fs candidate). Spec: csd
      testdata/drop-test/mosquitto-caps.yaml.

  - profile: catalog/docker.io/library/eclipse-mosquitto.yaml
    image: docker.io/library/eclipse-mosquitto
    tag: "2.0"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/mosquitto.sh
    note: >-
      read_only:true, tmpfs:[] — data/log are declared VOLUMEs (persistent,
      never tmpfs); /tmp not required. Spec: csd
      testdata/drop-test/mosquitto-fs.yaml.

  - profile: catalog/docker.io/library/wordpress.yaml
    image: docker.io/library/wordpress
    tag: "6.9"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/wordpress.sh
    note: >-
      cap_add:[CHOWN, DAC_OVERRIDE, FOWNER, NET_BIND_SERVICE, SETGID, SETUID]
      — richest evidence set in the catalog: tar --owner source-copy
      (CHOWN+FOWNER), root-phase wp-config write (DAC_OVERRIDE), apache
      master/worker drop (SETUID hard-fails; SETGID = SILENT ROOT WORKERS,
      only the uid assert catches — httpd edge reproduced), :80 under the
      pinned ip_unprivileged_port_start=1024 posture. In-stack: deps mysql
      (the cataloged 8.4). HARNESS RULE from this derivation: capture-then-
      match, never `curl | grep -q` under pipefail (SIGPIPE 141 = false
      negative once the body outgrows the pipe buffer; burned three runs).
      Spec: csd testdata/drop-test/wordpress-caps.yaml.

  - profile: catalog/docker.io/library/nextcloud.yaml
    image: docker.io/library/nextcloud
    tag: "32"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/nextcloud.sh
    note: >-
      cap_add:[CHOWN, DAC_OVERRIDE, FOWNER, NET_BIND_SERVICE, SETGID, SETUID]
      — wordpress's set with rsync evidence (entrypoint rsync -a of ~700MB
      into the docroot VOLUME needs the ownership/perms trio). In-stack: deps
      mariadb (cataloged 11.4). LIFECYCLE QUIRK the harness must handle: a
      fresh-docroot container cannot adopt an installed DB (boots
      installed:false limbo) — per-trial DB reset + docker restart, install
      re-runs under the trial's cap posture. :80 under the pinned
      ip_unprivileged_port_start=1024. Spec: csd
      testdata/drop-test/nextcloud-caps.yaml.

  - profile: catalog/docker.io/jellyfin/jellyfin.yaml
    image: docker.io/jellyfin/jellyfin
    tag: "10.11"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/jellyfin.sh
    note: >-
      ZERO-CAP while running AS ROOT (the instructive contrast to
      prometheus/memcached's non-root-by-construction): unprivileged :8096,
      writes only to /config+/cache VOLUMEs — the whole Docker default set is
      over-grant; residual risk = the root uid (harden further with user:).
      GPU/transcode = devices dimension, out of scope (csd#266 class).
      Workload = real wizard REST + token auth + authorized System/Info.
      Spec: csd testdata/drop-test/jellyfin-caps.yaml.

  - profile: catalog/docker.io/jellyfin/jellyfin.yaml
    image: docker.io/jellyfin/jellyfin
    tag: "10.11"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/jellyfin.sh
    note: >-
      read_only:true, tmpfs:[] — NOT EVEN /tmp; all writes land in the
      /config+/cache VOLUMEs. Spec: csd testdata/drop-test/jellyfin-fs.yaml.

  - profile: catalog/docker.io/pihole/pihole.yaml
    image: docker.io/pihole/pihole
    tag: "2026.07.2"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/pihole.sh
    note: >-
      cap_add:[CHOWN, DAC_OVERRIDE, NET_BIND_SERVICE, SETFCAP, SETGID,
      SETUID], DNS-only scope. FOURTH privilege shape: root entrypoint
      SETCAPs the FTL binary (SETFCAP genuinely required); FTL runs non-root
      with file-cap NET_BIND_SERVICE for :53. HARD CONSTRAINT: NO
      no-new-privileges (nnp blocks file-cap acquisition -> can never bind
      :53 under the pinned privileged-port sysctl) — the only no-nnp profile.
      Over-grant finding confirmed: NET_RAW/SYS_NICE/etc all removable.
      Workload digs pi.hole (answered locally — no upstream in the loop).
      Spec: csd testdata/drop-test/pihole-caps.yaml.

  - profile: catalog/docker.io/minio/minio.yaml
    image: docker.io/minio/minio
    tag: "RELEASE.2025-09-07T16-13-09Z"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/minio.sh
    note: >-
      ZERO-CAP as root (jellyfin-class): static Go binary, unprivileged
      :9000, VOLUME-only writes. Workload = real S3 mb/put/get via the pinned
      mc sidecar (MC_HOST_ env alias = config-free probe). Spec: csd
      testdata/drop-test/minio-caps.yaml.
