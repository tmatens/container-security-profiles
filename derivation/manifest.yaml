# Re-derivation spec (compose-lint#360 step 4). How to re-derive each catalog
# profile representatively. Consumed by container-sec-derive's derive-profiles
# loop on the self-hosted BPF runner: on a digest bump it re-derives against the
# new digest and, if the recommendation is unchanged, bumps validated_image +
# validated_date; if it changed, opens a human-review PR.
#
# The loop dispatches per `method`:
#   drop-test       — csd's scripts/drop_test.sh: drop-a-candidate / restart /
#                     correctness check. Covers the full container lifetime,
#                     so it derives the startup-only minimums runtime observation
#                     is blind to (a socket dir's tmpfs, a root->user privilege
#                     drop's SETUID/SETGID). Both current entries use it.
#   bpf-observation — csd --observe: the ig gadgets, for dimensions whose
#                     requirements are purely runtime.
# Both methods are automated; the loop matches a drop-test entry to its csd spec
# (testdata/drop-test/*.yaml) by image + dimension.
images:
  - profile: catalog/docker.io/library/postgres.yaml
    image: docker.io/library/postgres
    tag: "16"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/postgres.sh
    note: >-
      read_only:true + tmpfs:[/run/postgresql]. The tmpfs is not purely
      observable — postgres creates its socket dir at startup, which is
      attach-window-blind. Re-derive by verification: run under read_only +
      candidate tmpfs and confirm the workload passes (it fails with no tmpfs:
      "could not create lock file /var/run/postgresql/...: Read-only file system").

  - profile: catalog/docker.io/library/postgres.yaml
    image: docker.io/library/postgres
    tag: "16"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/postgres.sh
    note: >-
      cap_add:[CHOWN, DAC_OVERRIDE, SETGID, SETUID] — all startup caps (gosu
      root->postgres drop + initdb). Derived under the filesystem dimension's
      read_only+tmpfs recommendation (the profile is applied as a unit): the
      root-owned tmpfs socket dir must be chowned → CHOWN, invisible when caps are
      derived on a writable rootfs. Correctness check asserts the server (PID 1) is
      non-root. The combined profile is workload-verified.

  - profile: catalog/docker.io/netdata/netdata.yaml
    image: docker.io/netdata/netdata
    tag: v2.10.3
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/netdata.sh
    note: >-
      cap_add minimum via drop-and-restart drop-test with the netdata.sh
      correctness check (asserts the daemon still drops to a non-root uid).
      Startup caps (SETUID/SETGID) are invisible to runtime observation.
      Representative run: pid:host, host /proc,/sys,docker.sock ro-mounts, host
      network, the granted cap set present.

  - profile: catalog/docker.io/library/caddy.yaml
    image: docker.io/library/caddy
    tag: "2"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/caddy.sh
    note: >-
      cap_add minimum via drop-test: baseline cap_drop:ALL + the Docker default
      cap set, drop each and re-verify the file server serves on :80. Only
      NET_BIND_SERVICE (bind the privileged :80) survives.

  - profile: catalog/docker.io/library/caddy.yaml
    image: docker.io/library/caddy
    tag: "2"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/caddy.sh
    note: >-
      read_only:true, tmpfs:[] — caddy serves under --read-only; /data (certs)
      and /config (autosave) drop-test as not-required-as-tmpfs and belong on
      persistent volumes.

  - profile: catalog/ghcr.io/gethomepage/homepage.yaml
    image: ghcr.io/gethomepage/homepage
    tag: v1.13.2
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/homepage.sh
    note: >-
      read_only:true, tmpfs:[/app/.next/cache] — Next.js image optimization
      mkdir's the cache on the first /_next/image request and errors when it
      isn't writable (a bare dashboard GET serves without it, so the correctness check
      must exercise image optimization). /app/config is a persistent volume, not
      tmpfs; /tmp is not required.

  - profile: catalog/codeberg.org/forgejo/forgejo.yaml
    image: codeberg.org/forgejo/forgejo
    tag: "15"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/forgejo.sh
    note: >-
      cap_add:[CHOWN, DAC_OVERRIDE, SETGID, SETUID, SYS_CHROOT] via drop-test:
      baseline cap_drop:ALL + the Docker default cap set on a fresh /data volume,
      drop each and re-verify. The container runs two root daemons under s6, so the
      minimum is the union: gitea web needs CHOWN/DAC_OVERRIDE (chown+setup the
      fresh /data) + SETUID/SETGID (su-exec root->git drop); sshd needs SYS_CHROOT
      (per-connection privsep chroot). SYS_CHROOT is the coverage sharp edge — a
      web-only check reports 200 while git-over-SSH is dead, so the workload
      exercises SSH. All five are startup caps, invisible to runtime observation.

  - profile: catalog/ghcr.io/home-assistant/home-assistant.yaml
    image: ghcr.io/home-assistant/home-assistant
    tag: stable
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/home-assistant.sh
    note: >-
      cap_add:[DAC_OVERRIDE] via drop-test: baseline cap_drop:ALL + the Docker
      default cap set, drop each and re-verify HA reaches onboarding + creates the
      owner user. HA runs python3 -m homeassistant under s6 AS ROOT (no privilege
      drop, no chown), so the only cap it needs is DAC_OVERRIDE — root writing its
      DB/.storage/logs into a NON-root-owned /config bind. Derived under a fresh,
      non-root-owned /config (faithful to the ./config bind); a root-owned config
      needs no caps. HA *core* only — integration-specific caps (NET_RAW ping,
      device access, NET_ADMIN) are not exercised by a base instance (see criteria).

  - profile: catalog/docker.io/library/mariadb.yaml
    image: docker.io/library/mariadb
    tag: "11.4"
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/mariadb.sh
    note: >-
      cap_add:[SETGID, SETUID] via drop-test: baseline cap_drop:ALL + the Docker
      default cap set on a fresh datadir, drop each and re-verify a query round-trip
      + a non-root (uid 999) mariadbd. The entrypoint re-execs as the mysql user via
      gosu (SETUID/SETGID) — the only always-required step. CHOWN/DAC_OVERRIDE are
      NOT needed by default: the image ships /var/lib/mysql owned by mysql, so a
      docker-managed volume inherits it and the find-chown is a no-op. A foreign-owned
      bind mount adds CHOWN (only); running as the mysql uid on a pre-owned datadir
      shrinks it to []. Startup caps, invisible to runtime observation.

  - profile: catalog/docker.io/grafana/grafana.yaml
    image: docker.io/grafana/grafana
    tag: "13.0.2"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/grafana.sh
    note: >-
      read_only:true, tmpfs:[] — grafana runs under --read-only with only its
      /var/lib/grafana data volume (persistent: sqlite DB + plugins, NOT tmpfs)
      writable. Baseline read_only + candidate /tmp; drop /tmp and re-verify health
      db ok + a dashboard write/read-back + a backend datasource (Loki) plugin
      running. /tmp is NOT required for core + prometheus/Loki datasource querying;
      it is used only by runtime plugin installation, the elasticsearch plugin, and
      rendering/export (add tmpfs:[/tmp] for those). Confidence moderate — grafana's
      feature surface exceeds this workload's coverage (see criteria).

  - profile: catalog/docker.io/grafana/loki.yaml
    image: docker.io/grafana/loki
    tag: "3.7.2"
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/loki.sh
    note: >-
      read_only:true, tmpfs:[] — loki runs under --read-only with only its /loki
      data dir (persistent: chunks/WAL/index/rules, NOT tmpfs) writable. Baseline
      read_only + candidate /tmp; drop /tmp and re-verify loki reaches /ready + a
      log push (204) + a query round-trip returns the line. /tmp NOT required (zero
      read-only-fs errors). loki is DISTROLESS, so the correctness check probes it
      from a sidecar sharing its netns, not docker exec. /loki stand-in is
      mode=1777 (loki runs as non-root uid 10001).

  - profile: catalog/docker.io/grafana/alloy.yaml
    image: docker.io/grafana/alloy
    tag: v1.16.2
    dimension: filesystem
    method: drop-test
    workload: profiles/workloads/alloy.sh
    note: >-
      read_only:true, tmpfs:[] — alloy runs under --read-only with only its
      storage.path location writable (default --storage.path=/var/lib/alloy/data;
      the persistent WAL/state dir, NOT tmpfs). Baseline read_only + candidate /tmp;
      drop /tmp and re-verify /-/ready + live alloy_ pipeline metrics. /tmp NOT
      required under the default storage.path (a --storage.path=/tmp/alloy override
      would need tmpfs:[/tmp]). alloy is DISTROLESS, so the check probes it from a
      sidecar sharing its netns (the same helper loki uses), not docker exec. The
      writable stand-in is mounted at the PARENT /var/lib/alloy (alloy creates the
      data subdir itself) with mode=1777 (alloy runs as non-root uid 473).

  - profile: catalog/docker.io/itzg/minecraft-server.yaml
    image: docker.io/itzg/minecraft-server
    tag: latest
    dimension: capabilities
    method: drop-test
    workload: profiles/workloads/minecraft.sh
    note: >-
      cap_add:[SETGID, SETUID] via drop-test: baseline cap_drop:ALL + the Docker
      default cap set on a fresh /data volume, drop each and re-verify the server
      answers mc-monitor status as a non-root (uid 1000) process. The entrypoint
      gosu-drops root->minecraft (SETUID/SETGID); CHOWN/DAC_OVERRIDE are NOT needed
      (image ships /data owned by 1000, a docker volume inherits it). Server-flavour
      independent (derived with a fast VANILLA/FLAT config). NOTE: re-derive with
      anonymous volumes cleaned per trial (drop_test.sh rm -f -v) + adequate free
      disk — this image downloads a jar + gens a world per trial, so leaked volumes
      exhaust disk and yield spurious "required" verdicts.

